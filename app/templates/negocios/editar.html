{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2>Editar negocio</h2>

    <form method="POST" class="form">
        <label>Nombre *</label>
        <input type="text" name="nombre" value="{{ negocio.nombre }}" required>

        <label>Dirección</label>
        <input type="text" name="direccion" value="{{ negocio.direccion }}">

        <label>Teléfono</label>
        <input type="text" name="telefono" value="{{ negocio.telefono }}">

        <label>Hora apertura *</label>
        <select name="hora_apertura" required>
            {% for hora in horas %}
                <option value="{{ hora }}" {% if hora_apertura == hora %}selected{% endif %}>
                    {{ hora }}
                </option>
            {% endfor %}
        </select>

        <label>Hora cierre *</label>
        <select name="hora_cierre" required>
            {% for hora in horas %}
                <option value="{{ hora }}" {% if hora_cierre == hora %}selected{% endif %}>
                    {{ hora }}
                </option>
            {% endfor %}
        </select>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Guardar cambios</button>
            <a href="{{ url_for('negocios.listar_negocios') }}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
