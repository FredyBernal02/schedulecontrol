<header class="main-header">
    <h1>ScheduleControl</h1>
    <p class="subtitle">Sistema de gestión de turnos y citas</p>

    {% if session.get('usuario_id') %}
        <nav class="main-nav">
            <a href="{{ url_for('main.dashboard') }}">Inicio</a>
            <a href="{{ url_for('negocios.listar_negocios') }}">Negocios</a>
            <a href="/clientes/listar">Clientes</a>
            <a href="/servicios/listar">Servicios</a>
            <a href="/citas/listar">Citas</a>
            <span class="user-name">
                Hola, <span>{{ session.get('usuario_nombre') }}</span>
            </span>
            <a href="{{ url_for('auth.logout') }}" class="logout-link" title="Cerrar sesión">⏻</a>
        </nav>
    {% endif %}
    
</header>
