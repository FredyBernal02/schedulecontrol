{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2>Editar cita</h2>

    <form method="POST" class="form">
        <label>Cliente</label>
        <select name="id_cliente" required>
            {% for cliente in clientes %}
                <option value="{{ cliente.id_cliente }}" {% if cliente.id_cliente == cita.id_cliente %}selected{% endif %}>
                    {{ cliente.nombre }}
                </option>
            {% endfor %}
        </select>

        <label>Servicio</label>
        <select name="id_servicio" required>
            {% for servicio in servicios %}
                <option value="{{ servicio.id_servicio }}" {% if servicio.id_servicio == cita.id_servicio %}selected{% endif %}>
                    {{ servicio.nombre }}
                </option>
            {% endfor %}
        </select>

        <label>Negocio</label>
        <select name="id_negocio" required>
            {% for negocio in negocios %}
                <option value="{{ negocio.id_negocio }}" {% if negocio.id_negocio == cita.id_negocio %}selected{% endif %}>
                    {{ negocio.nombre }}
                </option>
            {% endfor %}
        </select>

        <label>Fecha</label>
        <input type="date" name="fecha" value="{{ cita.fecha }}" required>

        <label>Hora</label>
        <input type="time" name="hora" value="{{ cita.hora_inicio.strftime('%H:%M') }}" required>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Guardar cambios</button>
            <a href="{{ url_for('citas.listar_citas') }}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
