{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2>Crear cita</h2>

    {% if error %}
        <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/citas/nuevo" class="form">
        <label>Cliente *</label>
        <select name="id_cliente" required onchange="window.location=this.form.action+'?'+new URLSearchParams(new FormData(this.form)).toString()+'#hora-disponible'">
            <option value="" disabled {% if not id_cliente %}selected{% endif %}>Seleccione un cliente</option>
            {% for cliente in clientes %}
                <option value="{{ cliente.id_cliente }}" {% if id_cliente and id_cliente|int == cliente.id_cliente %}selected{% endif %}>
                    {{ cliente.nombre }}
                </option>
            {% endfor %}
        </select>

        <label>Servicio *</label>
        <select name="id_servicio" required onchange="window.location=this.form.action+'?'+new URLSearchParams(new FormData(this.form)).toString()+'#hora-disponible'">
            <option value="" disabled {% if not id_servicio %}selected{% endif %}>Seleccione un servicio</option>
            {% for servicio in servicios %}
                <option value="{{ servicio.id_servicio }}" {% if id_servicio and id_servicio|int == servicio.id_servicio %}selected{% endif %}>
                    {{ servicio.nombre }}
                </option>
            {% endfor %}
        </select>

        <label>Negocio *</label>
        <select name="id_negocio" required onchange="window.location=this.form.action+'?'+new URLSearchParams(new FormData(this.form)).toString()+'#hora-disponible'">
            <option value="" disabled {% if not id_negocio %}selected{% endif %}>Seleccione un negocio</option>
            {% for negocio in negocios %}
                <option value="{{ negocio.id_negocio }}" {% if id_negocio and id_negocio|int == negocio.id_negocio %}selected{% endif %}>
                    {{ negocio.nombre }}
                </option>
            {% endfor %}
        </select>

        <label>Fecha *</label>
        <input 
            type="date" 
            name="fecha" 
            value="{{ fecha or '' }}"
            min="{{ fecha_actual }}"
            required 
            onkeydown="return false" 
            onchange="window.location=this.form.action+'?'+new URLSearchParams(new FormData(this.form)).toString()+'#hora-disponible'"
            onfocus="this.showPicker()" 
            onclick="this.showPicker()"
        >

        <label id="hora-disponible">Hora *</label>

        {% if horas_disponibles %}
            <div class="horarios-grid">
                {% for item in horas_disponibles %}
                    <label class="hora-card {% if item.ocupada %}ocupada{% endif %}">
                        <input 
                            type="radio" 
                            name="hora" 
                            value="{{ item.hora }}" 
                            required
                            {% if item.ocupada %}disabled{% endif %}
                        >
                        <span>{{ item.hora }}</span>
                    </label>
                {% endfor %}
            </div>
        {% else %}
            <p>Selecciona cliente, negocio, servicio y fecha para ver horarios disponibles.</p>
        {% endif %}

        <div class="form-actions">
            <button type="submit" class="btn-primary">Guardar</button>
            <a href="/citas/listar" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
