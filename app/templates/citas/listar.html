{% extends "base.html" %}

{% block content %}
<h2>Citas registradas</h2>

<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Servicio</th>
            <th>Negocio</th>
            <th>Fecha</th>
            <th>Hora</th>
        </tr>
    </thead>
    <tbody>
        {% for cita in citas %}
        <tr>
            <td>{{ cita.id_cita }}</td>
            <td>{{ cita.cliente.nombre }}</td>
            <td>{{ cita.servicio.nombre }}</td>
            <td>{{ cita.negocio.nombre }}</td>
            <td>{{ cita.fecha }}</td>
            <td>{{ cita.hora }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
