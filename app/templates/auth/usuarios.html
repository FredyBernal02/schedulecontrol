{% extends "base.html" %}

{% block content %}
<div class="table-container">
    <h2>Usuarios registrados</h2>

    <a href="{{ url_for('auth.crear_usuario') }}" class="btn btn-primary">
        + Nuevo usuario
    </a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
            </tr>
        </thead>
        <tbody>
            {% for usuario in usuarios %}
            <tr>
                <td>{{ usuario.id_usuario }}</td>
                <td>{{ usuario.nombre }}</td>
                <td>{{ usuario.correo }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
