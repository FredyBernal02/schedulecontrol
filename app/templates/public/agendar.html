{% extends "base.html" %}

{% block content %}
<div class="form-card" id="reserva-form">
    <h2>Agenda tu cita fácil y rápido</h2>
    <p class="form-subtitle">
        Completa tus datos, elige el servicio y selecciona el horario disponible que prefieras.
    </p>

    <form method="GET" action="/agendar" class="form">
        <label>Nombre *</label>
        <input type="text" name="nombre" value="{{ request.args.get('nombre', '') }}" required>

        <label>Correo</label>
        <input type="email" name="correo" value="{{ request.args.get('correo', '') }}">

        <label>Teléfono *</label>
        <input type="text" name="telefono" value="{{ request.args.get('telefono', '') }}" required>

        <label>Negocio *</label>
        <select name="id_negocio" id="negocio-select" required onchange="window.location=this.form.action+'?'+new URLSearchParams(new FormData(this.form)).toString()+'#hora-disponible'">
            <option value="">Selecciona un negocio</option>
            {% for negocio in negocios %}
            <option value="{{ negocio.id_negocio }}" {% if id_negocio and id_negocio|int == negocio.id_negocio %}selected{% endif %}>
                {{ negocio.nombre }}
            </option>
            {% endfor %}
        </select>

        <label>Servicio *</label>
        <select name="id_servicio" id="servicio-select" required onchange="window.location=this.form.action+'?'+new URLSearchParams(new FormData(this.form)).toString()+'#hora-disponible'">
            <option value="">Selecciona un servicio</option>
            {% for servicio in servicios %}
            <option value="{{ servicio.id_servicio }}" data-negocio="{{ servicio.id_negocio }}" {% if id_servicio and id_servicio|int == servicio.id_servicio %}selected{% endif %}>
                {{ servicio.nombre }}
            </option>
            {% endfor %}
        </select>

        <label>Fecha *</label>
        <input type="date" name="fecha" value="{{ fecha if fecha else '' }}" min="{{ fecha_actual }}" required
            onchange="window.location=this.form.action+'?'+new URLSearchParams(new FormData(this.form)).toString()+'#hora-disponible'"
            onkeydown="return false"
            onfocus="this.showPicker()"
            onclick="this.showPicker()">

        <label id="hora-disponible">Hora *</label>
        <select name="hora" required>
            <option value="">Selecciona una hora</option>
            {% for item in horas_disponibles %}
                {% if item.ocupada %}
                    <option value="{{ item.hora }}" disabled>{{ item.hora }} - Ocupado</option>
                {% else %}
                    <option value="{{ item.hora }}">{{ item.hora }}</option>
                {% endif %}
            {% endfor %}
        </select>

        <div class="form-actions">
            <button type="submit" class="btn-primary" formaction="/agendar" formmethod="POST">Reservar cita</button>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const negocioSelect = document.getElementById('negocio-select');
    const servicioSelect = document.getElementById('servicio-select');

    function filtrarServicios() {

        const negocioSeleccionado = negocioSelect.value;

        Array.from(servicioSelect.options).forEach(option => {

            if (option.value === "") {
                option.hidden = false;
                return;
            }

            if (option.dataset.negocio === negocioSeleccionado) {
                option.hidden = false;
            } else {
                option.hidden = true;
            }

        });

    }

    negocioSelect.addEventListener('change', filtrarServicios);

    filtrarServicios();

});
</script>
{% endblock %}
