{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2>Editar servicio</h2>

    <form method="POST" class="form">
        <label>Nombre</label>
        <input type="text" name="nombre" value="{{ servicio.nombre }}" required>

        <label>Duración (min)</label>
        <input type="number" name="duracion" value="{{ servicio.duracion }}" required>

        <label>Precio</label>
        <input type="number" name="precio" value="{{ servicio.precio }}" required>

        <label>Negocio</label>
        <select name="id_negocio" required>
            {% for negocio in negocios %}
                <option value="{{ negocio.id_negocio }}" {% if negocio.id_negocio == servicio.id_negocio %}selected{% endif %}>
                    {{ negocio.nombre }}
                </option>
            {% endfor %}
        </select>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Guardar cambios</button>
            <a href="{{ url_for('servicios.listar_servicios') }}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
